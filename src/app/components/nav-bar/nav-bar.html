<nav class="fixed top-0 left-0 right-0 z-50 bg-background/95 backdrop-blur-sm border-b border-border">
  <div class="container mx-auto px-4">

    <p-toast />
    <p-confirmDialog></p-confirmDialog>

    <div class="flex items-center justify-between h-16">
      <a routerLink="/" class="flex items-center gap-2 text-primary font-bold text-2xl">
        <i class="bi bi-car-front-fill"></i>
        <span>CovoitGo</span>
      </a>

      <!-- Desktop -->
      <div class="hidden md:flex items-center gap-6">

        <a routerLink="/liste" class="text-lg">Rechercher un trajet</a>
        <a routerLink="/create" class="text-lg">Proposer un trajet</a>

        <!-- NON CONNECTÉ -->
        <div *ngIf="!user" class="flex gap-3">
          <a routerLink="/login">
            <button class="text-lg border px-5 py-2 rounded-md">Connexion</button>
          </a>
          <a routerLink="/register">
            <button class="text-lg bg-primary text-white px-5 py-2 rounded-md">Inscription</button>
          </a>
        </div>

        <!-- CONNECTÉ -->
        <div *ngIf="user" class="flex items-center gap-4">
          <span class="font-semibold text-xl" (click)="goTo()" style="cursor: pointer;">
            {{ user.firstName }} {{ user.name }}
          </span>
          <button
            (click)="confirmLogout()"
            title="Déconnexion"
          >
            <i class="pi pi-sign-out text-xl"></i>
          </button>
        </div>

      </div>

      <!-- Mobile button -->
      <button class="md:hidden text-2xl" (click)="toggleMenu()">
        <i [ngClass]="mobileMenuOpen ? 'bi bi-x-lg' : 'bi bi-list'"></i>
      </button>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="mobileMenuOpen" class="md:hidden py-4 space-y-4">

      <!-- Liens communs -->
      <a routerLink="/liste" (click)="closeMenu()" class="block text-center">
        Rechercher un trajet
      </a>

      <a routerLink="/create" (click)="closeMenu()" class="block text-center">
        Proposer un trajet
      </a>

      <hr />

      <!-- NON CONNECTÉ -->
      <ng-container *ngIf="!user; else connected">
        <a routerLink="/login" (click)="closeMenu()">
          <button class="border w-full py-2">Connexion</button>
        </a>
        <a routerLink="/register" (click)="closeMenu()">
          <button class="bg-primary text-white w-full py-2">Inscription</button>
        </a>
      </ng-container>

      <!-- CONNECTÉ -->
      <ng-template #connected>
        <div class="text-center font-semibold" (click)="goTo()">
          {{ user.firstName }} {{ user.name }}
        </div>

        <button
          (click)="confirmLogout()"
          title="Déconnexion"
        >
          <i class="pi pi-sign-out text-lg"></i>
          <span>Déconnexion</span>
        </button>
      </ng-template>

    </div>
  </div>
</nav>
