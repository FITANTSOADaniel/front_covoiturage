<div class="min-h-screen bg-background flex flex-col">

  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
      <div class="bg-white rounded-2xl shadow-lg p-8">
        <h2 class="text-3xl font-bold text-center mb-6">
          Connexion
        </h2>

        <form class="space-y-5">
          <div class="space-y-2">
            <label class="text-base font-medium flex items-center gap-2">
              Email
            </label>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="votre@email.com"
              required
              class="w-full border rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary"
            />
          </div>

          <div class="space-y-2">
            <label class="text-base font-medium flex items-center gap-2">
              Mot de passe
            </label>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              required
              class="w-full border rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary"
            />
          </div>

          <button
            type="button"
            class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:opacity-90 transition text-base"
            (click)="login()"
          >
            Se connecter
          </button>
        </form>

        <div class="mt-6 text-center text-base text-gray-600">
          Pas encore de compte ?
          <a
            routerLink="/register"
            class="text-primary hover:underline font-medium"
          >
            S'inscrire
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
