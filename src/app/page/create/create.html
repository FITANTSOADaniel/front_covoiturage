<div class="max-w-2xl mx-auto mt-20">
  <div class="bg-white shadow-lg rounded-2xl p-6 border border-gray-100">
    <h2 class="text-3xl font-semibold mb-6 text-center">
      Détails du trajet
    </h2>
    <p-toast />
    <form (ngSubmit)="handleSubmit()" class="space-y-6">
      <!-- Ville de départ -->
      <div class="space-y-2">
        <label class="text-base font-medium flex items-center gap-2">
          Ville de départ
        </label>
        <input
          type="text"
          placeholder="Ex: Paris"
          [(ngModel)]="trajet.depart"
          name="departure"
          required
          class="w-full border rounded-lg p-3 text-base focus:ring-2 focus:ring-primary focus:outline-none"
        />
      </div>

      <!-- Ville d'arrivée -->
      <div class="space-y-2">
        <label class="text-base font-medium flex items-center gap-2">
          Ville d'arrivée
        </label>
        <input
          type="text"
          placeholder="Ex: Lyon"
          [(ngModel)]="trajet.destination"
          name="arrival"
          required
          class="w-full border rounded-lg p-3 text-base focus:ring-2 focus:ring-primary focus:outline-none"
        />
      </div>

      <!-- Date et Heure -->
      <div class="space-y-2">
        <label class="text-base font-medium flex items-center gap-2">
          Date
        </label>
        <input
          type="date"
          [(ngModel)]="trajet.dateDepart"
          name="date"
          required
          class="w-full border rounded-lg p-3 text-base focus:ring-2 focus:ring-primary focus:outline-none"
        />
      </div>

      <!-- Places & Prix -->
      <div class="grid md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="text-base font-medium flex items-center gap-2">
            Nombre de places
          </label>
          <input
            type="number"
            min="1"
            max="8"
            [(ngModel)]="trajet.freePlace"
            name="seats"
            required
            class="w-full border rounded-lg p-3 text-base focus:ring-2 focus:ring-primary focus:outline-none"
          />
        </div>

        <div class="space-y-2">
          <label class="text-base font-medium flex items-center gap-2">
            Prix par personne (€)
          </label>
          <input
            type="number"
            min="0"
            step="0.5"
            placeholder="Ex: 25"
            [(ngModel)]="trajet.price"
            name="price"
            required
            class="w-full border rounded-lg p-3 text-base focus:ring-2 focus:ring-primary focus:outline-none"
          />
        </div>
      </div>

      <!-- Bouton -->
      <div class="pt-4">
        <button
          type="submit"
          class="w-full bg-primary text-white font-semibold py-3 rounded-lg shadow-md hover:scale-105 hover:shadow-lg transition-all duration-300 text-lg"
        >
          Publier le trajet
        </button>
      </div>
    </form>
  </div>
</div>
